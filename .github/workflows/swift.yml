name: Swift

on: [push]

jobs:
  build:
    name: Build
    strategy:
      matrix:
        swift: ["6.3.3"]
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    container: swift:${{ matrix.swift }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Swift Version
      run: swift --version
    - name: Build (Debug)
      run: swift build -c debug
    - name: Build (Release)
      run: swift build -c release
